name: simpod
description:
  Stream and remotely control booted iOS simulators from the command line or a
  local web preview UI.
version: 0.0.2
repository: https://github.com/cscoderr/simpod

environment:
  sdk: ^3.12.0

resolution: workspace

executables:
  simpod:

dependencies:
  archive: ^3.6.1
  args: ^2.7.0
  http: ^1.6.0
  path: ^1.9.1
  pub_semver: ^2.2.0
  pub_updater: ^0.5.0
  qr: ^3.0.2
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  shelf_static: ^1.1.3
  shelf_web_socket: ^3.0.0
  simpod_core: ^0.0.2
  web_socket_channel: ^3.0.3
  web_socket_client: ^0.2.1

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
